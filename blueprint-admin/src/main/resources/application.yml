server:
  port: 8080

spring:
  application:
    name: blueprint-admin
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/blueprint
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
